name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
          libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev \
          libxinerama-dev libxrandr-dev libgl1-mesa-dev libglu1-mesa-dev \
          libwebkit2gtk-4.0-dev libgtk-3-dev ninja-build

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release

    - name: Package Artifacts (Linux)
      if: runner.os == 'Linux'
      run: |
        cd build/GalaxyStrobeTune_artefacts/Release/VST3
        zip -r ../../../../GalaxyStrobeTune_Linux.zip "Galaxy Strobe Tune.vst3"

    - name: Package Artifacts (macOS)
      if: runner.os == 'macOS'
      run: |
        cd build/GalaxyStrobeTune_artefacts/Release
        zip -r ../../../GalaxyStrobeTune_macOS.zip VST3/"Galaxy Strobe Tune.vst3" AU/"Galaxy Strobe Tune.component" "Standalone/Galaxy Strobe Tune.app"

    - name: Package Artifacts (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Compress-Archive -Path "build/GalaxyStrobeTune_artefacts/Release/VST3/Galaxy Strobe Tune.vst3", "build/GalaxyStrobeTune_artefacts/Release/Standalone/Galaxy Strobe Tune.exe" -DestinationPath GalaxyStrobeTune_Windows.zip

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-build
        path: "*.zip"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
